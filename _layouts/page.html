---
layout: default
---
<!-- Page Layout -->
<section class="hero">
    <img src="{{ site.baseurl }}/files/huerta3.png" alt="Hero Background" class="hero-bg">
    <div class="hero-content container">
        <h1>{{ page.title }}</h1>
        {% if page.description %}
            <p>{{ page.description }}</p>
        {% endif %}
    </div>
</section>

<div class="container page-content">
    {{ content }}
</div>
